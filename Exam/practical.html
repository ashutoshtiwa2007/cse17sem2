<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd or Even Checker</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="card mx-auto p-4 shadow" style="max-width: 400px;">
      <h2 class="text-center mb-4">Odd or Even Checker</h2>

      <input type="number" id="numberInput" class="form-control mb-3" placeholder="Enter a number">

      <button onclick="checkNumber()" class="btn btn-primary w-100">Check</button>

      <h4 id="result" class="text-center mt-4"></h4>
    </div>
  </div>

  <script>
    function checkNumber() {
      var num = document.getElementById("numberInput").value;
      var result = document.getElementById("result");

      if (num === "") {
        result.innerText = "Please enter a number";
      } else if (num % 2 === 0) {
        result.innerText = num + " is Even";
      } else {
        result.innerText = num + " is Odd";
      }
    }
  </script>

</body>
</html>
